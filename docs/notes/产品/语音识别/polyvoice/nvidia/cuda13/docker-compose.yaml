services:
  # API service
  asr:
    runtime: nvidia
    image: polynex/poly-voice:${POLYVOICE_VERSION:-3.0.1}
    environment:
      <<: *shared-polyvoice-env
      REDIS_HOST: host.docker.internal
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "${EXPOSE_ASR_PORT:-8010}:8010"
    volumes:
      - ./logs:/app/logs
      - /tmp:/tmp
      - /home/zjzb/data/res:/data/res
      - ./volumes/voiceprint/data:/data/voiceprint/data
      - ./license.json:/app/1/license.json
      - /usr/lib/wsl/lib/libnvidia-gpucomp.so:/usr/lib/wsl/lib/libnvidia-gpucomp.so.580.102.01:ro
    restart: unless-stopped
    privileged: true
    ipc: host
    shm_size: ${SHM_SIZE:-16GB}
    networks:
      - poly_voice_network

  redis:
    image: redis:6-alpine
    restart: always
    environment:
      REDISCLI_AUTH: ${REDIS_PASSWORD:-nexfusion123456}
    volumes:
      # Mount the redis data directory to the container.
      - ./volumes/redis/data:/data
    # Set the redis password when startup redis server.
    command: redis-server --requirepass ${REDIS_PASSWORD:-nexfusion123456}
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
    networks:
      - poly_voice_network

  nginx:
    image: nginx:latest
    restart: always
    ports:
      - "${NGINX_PORT:-80}:80"
      - "${NGINX_HTTPS_PORT:-443}:443"
    volumes:
      - ./nginx/nginx.conf.template:/etc/nginx/nginx.conf.template
      - ./nginx/proxy.conf.template:/etc/nginx/proxy.conf.template
      - ./nginx/https.conf.template:/etc/nginx/https.conf.template
      - ./nginx/conf.d:/etc/nginx/conf.d
      - ./nginx/docker-entrypoint.sh:/docker-entrypoint-mount.sh
      - ./nginx/ssl:/etc/ssl # cert dir (legacy)
      - ./nginx/voice_transcription.html:/usr/share/nginx/html/voice_transcription.html
      - ./nginx/voice_transcription_poly.html:/usr/share/nginx/html/voice_transcription_poly.html
      - ./nginx/PolyNex.png:/usr/share/nginx/html/PolyNex.png
    entrypoint: [ 'sh', '-c', "cp /docker-entrypoint-mount.sh /docker-entrypoint.sh && sed -i 's/\r$$//' /docker-entrypoint.sh && chmod +x /docker-entrypoint.sh && /docker-entrypoint.sh" ]
    networks:
      - poly_voice_network
    environment:
      NGINX_SERVER_NAME: ${NGINX_SERVER_NAME:-_}
      NGINX_HTTPS_ENABLED: ${NGINX_HTTPS_ENABLED:-false}
      NGINX_SSL_PORT: ${NGINX_SSL_PORT:-443}
      NGINX_PORT: ${NGINX_PORT:-80}
      # You're required to add your own SSL certificates/keys to the `./nginx/ssl` directory

<!--

    使用说明：
    1. 请在 API_CONFIG 中配置正确的 baseUrl 和 apiKey
    2. baseUrl: API服务器地址，例如 'http://localhost' 或 'https://your-api-domain.com'
    3. apiKey: 您的API密钥，请联系服务提供商获取
    
    支持的音频格式：
    WAV, MP3, FLAC, AMR, AAC, M4A, OGG, OPUS, AC3, AIFF, WMA
    
    API接口：/v1/voice/stt
    请求方式：POST (multipart/form-data)
    认证方式：Bearer Token
-->

<body>
    <div class="container">
        <header class="header">
            <img src="PolyNex.svg" alt="PolyVoice Logo" class="header-logo">
            <h1>PolyVoice 全球语音转录</h1>
        </header>

        <div class="main-content">
            <!-- 左侧：语音文件区 -->
            <div class="sidebar">
                <!-- 文件上传区域 -->
                <div class="upload-area" onclick="document.getElementById('audioFile').click()"
                    ondrop="handleDrop(event)" ondragover="handleDragOver(event)" ondragleave="handleDragLeave(event)">
                    <div class="upload-icon">🎵</div>
                    <div class="upload-text">点击上传或拖拽语音文件</div>
                    <div class="upload-hint">支持 WAV、MP3、FLAC、AMR、AAC、M4A、OGG、OPUS、AC3、AIFF、WMA、MP4 格式</div>
                    <div class="upload-hint" style="font-size: 12px; margin-top: 4px;">文件最大 100MB</div>
                </div>
                <input type="file" id="audioFile" class="file-input"
                    accept=".wav,.mp3,.flac,.amr,.aac,.m4a,.ogg,.opus,.ac3,.aiff,.wma"
                    onchange="handleFileSelect(event)">

                <!-- 音频预览区域 -->
                <div id="audioPreview" class="audio-preview" style="display: none;">
                    <button class="file-remove" onclick="removeFile()" title="移除文件">×</button>
                    <div class="audio-info">
                        <div class="audio-icon">🎵</div>
                        <div class="audio-details">
                            <h4 id="audioFileName">音频文件名</h4>
                            <p id="audioFileSize">文件大小</p>
                        </div>
                    </div>
                    <audio id="audioPlayer" class="audio-controls" controls>
                        您的浏览器不支持音频播放。
                    </audio>
                </div>

                <!-- 参数配置 -->
                <div class="form-group">
                    <label class="form-label">语言设置</label>
                    <div class="searchable-select">
                        <input type="text" id="languageInput" class="select-input" placeholder="搜索或选择语言..."
                            oninput="filterLanguages()" onfocus="showLanguageDropdown()"
                            onblur="hideLanguageDropdown()">
                        <span class="select-arrow" id="languageArrow">▼</span>
                        <div class="select-dropdown" id="languageDropdown"></div>
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label">引擎设置</label>
                    <div class="searchable-select">
                        <input type="text" id="engineInput" class="select-input" placeholder="选择引擎..."
                            oninput="filterEngines()" onfocus="showEngineDropdown()" onblur="hideEngineDropdown()"
                            readonly>
                        <span class="select-arrow" id="engineArrow">▼</span>
                        <div class="select-dropdown" id="engineDropdown"></div>
                    </div>
                </div>

                <div class="checkbox-group">
                    <input type="checkbox" id="enableTimestamp" class="checkbox">
                    <label for="enableTimestamp">显示时间戳</label>
                </div>

                <div class="checkbox-group">
                    <input type="checkbox" id="enableSpeaker" class="checkbox">
                    <label for="enableSpeaker">说话人分离</label>
                </div>

                <!-- 执行按钮 -->
                <button id="transcribeBtn" class="btn btn-primary" onclick="startTranscription()" disabled>
                    开始转录
                </button>
            </div>

            <!-- 右侧：转录结果区 -->
            <div class="content-area">
                <div class="result-area">
                    <div class="result-title">转录结果</div>
                    <div id="resultContent" class="result-content">
                        <div class="empty-state">
                            <div class="empty-state-icon">🎙️</div>
                            <div>请上传语音文件并配置参数后开始转录</div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let currentAudioFile = null;
        let selectedLanguage = 'auto';
        let selectedEngine = 'auto';
        let isLanguageDropdownOpen = false;
        let isEngineDropdownOpen = false;

        // API配置

        // 初始化语言下拉框
        function initLanguageDropdown() {
            const dropdown = document.getElementById('languageDropdown');
            const input = document.getElementById('languageInput');

            // 设置默认值
            input.value = '自动识别';

            // 创建选项
            languages.forEach(lang => {
                const option = document.createElement('div');
                option.className = 'select-option';
                option.textContent = lang.name;
                option.dataset.code = lang.code;
                option.onclick = () => selectLanguage(lang.code, lang.name);
                dropdown.appendChild(option);
            });

            // 标记默认选中项
            dropdown.querySelector('[data-code="auto"]').classList.add('selected');
        }

        // 选择语言
        function selectLanguage(code, name) {
            selectedLanguage = code;
            document.getElementById('languageInput').value = name;

            // 更新选中状态
            document.querySelectorAll('.select-option').forEach(opt => {
                opt.classList.remove('selected');
            });
            document.querySelector(`[data-code="${code}"]`).classList.add('selected');

            hideLanguageDropdown();
        }

        // 显示下拉框
        function showLanguageDropdown() {
            const dropdown = document.getElementById('languageDropdown');
            const arrow = document.getElementById('languageArrow');
            dropdown.style.display = 'block';
            arrow.classList.add('open');
        }

        // 隐藏下拉框
        function hideLanguageDropdown() {
            setTimeout(() => {
                const dropdown = document.getElementById('languageDropdown');
                const arrow = document.getElementById('languageArrow');
                dropdown.style.display = 'none';
                arrow.classList.remove('open');
            }, 150);
        }

        // 过滤语言
        function filterLanguages() {
            const input = document.getElementById('languageInput');
            const filter = input.value.toLowerCase();
            const options = document.querySelectorAll('.select-option');
            let hasResults = false;

            options.forEach(option => {
                const text = option.textContent.toLowerCase();
                if (text.includes(filter)) {
                    option.classList.remove('hidden');
                    hasResults = true;
                } else {
                    option.classList.add('hidden');
                }
            });

            // 显示/隐藏无结果提示
            let noResults = document.querySelector('.no-results');
            if (!hasResults && filter) {
                if (!noResults) {
                    noResults = document.createElement('div');
                    noResults.className = 'no-results';
                    noResults.textContent = '未找到匹配的语言';
                    document.getElementById('languageDropdown').appendChild(noResults);
                }
                noResults.style.display = 'block';
            } else if (noResults) {
                noResults.style.display = 'none';
            }
        }

        // 开始转录
        async function startTranscription() {
            if (!currentAudioFile) {
                alert('请先上传音频文件');
                return;
            }

            const resultContent = document.getElementById('resultContent');
            const transcribeBtn = document.getElementById('transcribeBtn');

            // 显示加载状态
            transcribeBtn.disabled = true;
            transcribeBtn.textContent = '转录中...';

            resultContent.innerHTML = `
                <div class="loading">
                    <div class="spinner"></div>
                    <div>正在转录音频，请稍候...</div>
                </div>
            `;

            try {
                // 准备FormData
                const formData = new FormData();
                formData.append('audio_file', currentAudioFile);

                // 获取配置参数
                const enableTimestamp = document.getElementById('enableTimestamp').checked;
                const enableSpeaker = document.getElementById('enableSpeaker').checked;
                const language = selectedLanguage === 'auto' ? '' : selectedLanguage;

                // 添加可选参数
                if (language) {
                    formData.append('language', language);
                }
                formData.append('enable_timestamp', enableTimestamp.toString());
                formData.append('enable_speaker', enableSpeaker.toString());

                // 发送API请求
                const response = await fetch(`${API_CONFIG.baseUrl}${API_CONFIG.endpoint}`, {
                    method: 'POST',
                    body: formData
                });

                const result = await response.json();

                if (result.code === '0' || result.code === 0) {
                    // 转录成功，显示结果
                    const transcriptionResults = formatTranscriptionResults(result.data, enableTimestamp, enableSpeaker);
                    resultContent.innerHTML = transcriptionResults;
                } else {
                    // 转录失败，显示错误信息
                    resultContent.innerHTML = `
                        <div class="error-state">
                            <div class="error-icon">❌</div>
                            <div class="error-message">
                                <div class="error-title">转录失败</div>
                                <div class="error-detail">错误代码: ${result.code}</div>
                                <div class="error-detail">错误信息: ${result.msg || '未知错误'}</div>
                                <div class="error-tid">请求ID: ${result.tid || 'N/A'}</div>
                            </div>
                        </div>
                    `;
                }

            } catch (error) {
                console.error('转录请求失败:', error);
                resultContent.innerHTML = `
                    <div class="error-state">
                        <div class="error-icon">❌</div>
                        <div class="error-message">
                            <div class="error-title">网络错误</div>
                            <div class="error-detail">请检查网络连接和API配置</div>
                            <div class="error-detail">错误详情: ${error.message}</div>
                        </div>
                    </div>
                `;
            } finally {
                // 恢复按钮状态
                transcribeBtn.disabled = false;
                transcribeBtn.textContent = '开始转录';
            }
        }

        // 格式化转录结果
        function formatTranscriptionResults(data, enableTimestamp, enableSpeaker) {
            if (!data) {
                return `
                    <div class="error-state">
                        <div class="error-icon">❌</div>
                        <div class="error-message">
                            <div class="error-title">转录结果为空</div>
                            <div class="error-detail">未获取到有效的转录数据</div>
                        </div>
                    </div>
                `;
            }

            let html = '';

            // 如果有分段数据且启用了时间戳，显示分段结果
            if (data.segments && data.segments.length > 0 && enableTimestamp) {
                data.segments.forEach((segment, index) => {
                    html += `
                        <div class="transcript-segment">
                            <div class="segment-header">
                                <span class="segment-number">#${index + 1}</span>
                                <span class="segment-time">${segment.start} - ${segment.end}</span>
                                ${enableSpeaker && segment.speaker ? `<span class="segment-speaker">${segment.speaker}</span>` : ''}
                            </div>
                            <div class="segment-content">${segment.text}</div>
                        </div>
                    `;
                });
            } else {
                // 显示完整文本
                html = `
                    <div class="transcript-segment">
                        <div class="segment-header">
                            <span class="segment-number">#1</span>
                            <span class="segment-language">语言: ${data.language || '未知'}</span>
                        </div>
                        <div class="segment-content">${data.text || '无转录内容'}</div>
                    </div>
                `;
            }

            return html;
        }

        // 文件选择处理
        function handleFileSelect(event) {
            const file = event.target.files[0];
            if (!file) return;

            // 验证文件大小（100MB = 100 * 1024 * 1024 bytes）
            const maxSize = 100 * 1024 * 1024;
            if (file.size > maxSize) {
                alert('文件大小超过限制，请选择小于100MB的音频文件');
                event.target.value = ''; // 清空文件选择
                return;
            }

            // 验证文件类型
            const allowedTypes = ['.wav', '.mp3', '.flac', '.amr', '.aac', '.m4a', '.ogg', '.opus', '.ac3', '.aiff', '.wma'];
            const fileExtension = '.' + file.name.split('.').pop().toLowerCase();

            if (!allowedTypes.includes(fileExtension)) {
                alert('不支持的文件格式，请选择音频文件');
                return;
            }

            currentAudioFile = file;
            displayAudioPreview(file);
            document.getElementById('transcribeBtn').disabled = false;
        }

        // 显示音频预览
        function displayAudioPreview(file) {
            document.getElementById('audioPreview').style.display = 'block';
            document.getElementById('audioFileName').textContent = file.name;
            document.getElementById('audioFileSize').textContent = formatFileSize(file.size);

            // 设置音频播放器
            const audioPlayer = document.getElementById('audioPlayer');
            const audioUrl = URL.createObjectURL(file);
            audioPlayer.src = audioUrl;
        }

            `;

        // 格式化文件大小
        function formatFileSize(bytes) {
            if (bytes === 0) return '0 Bytes';
            const k = 1024;
            const sizes = ['Bytes', 'KB', 'MB', 'GB'];
            const i = Math.floor(Math.log(bytes) / Math.log(k));
            return parseFloat((bytes / Math.pow(k, i)).toFixed(2)) + ' ' + sizes[i];
        }

                    noResults.className = 'no-results';
                    noResults.textContent = '未找到匹配的语言';
                    document.getElementById('languageDropdown').appendChild(noResults);
                }
                noResults.style.display = 'block';
            } else if (noResults) {
                noResults.style.display = 'none';
            }
        }

        // 切换下拉框显示状态
        function toggleLanguageDropdown() {
            const dropdown = document.getElementById('languageDropdown');
            if (dropdown.style.display === 'block') {
                hideLanguageDropdown();
            } else {
                showLanguageDropdown();
            }
        }

        // 拖拽处理函数
        function handleDragOver(event) {
            event.preventDefault();
            event.currentTarget.classList.add('dragover');
        }

        function handleDragLeave(event) {
            event.currentTarget.classList.remove('dragover');
        }

        function handleDrop(event) {
            event.preventDefault();
            event.currentTarget.classList.remove('dragover');

            const files = event.dataTransfer.files;
            if (files.length > 0) {
                const fileInput = document.getElementById('audioFile');
                fileInput.files = files;
                handleFileSelect({ target: fileInput });
            }
        }

        // 引擎相关函数
        function initEngineDropdown() {
            const dropdown = document.getElementById('engineDropdown');
            const input = document.getElementById('engineInput');

            // 设置默认值
            input.value = '自动识别';

            // 创建选项
            engines.forEach(engine => {
                const option = document.createElement('div');
                option.className = 'select-option';
                option.textContent = engine.name;
                option.dataset.code = engine.code;
                option.onclick = () => selectEngine(engine.code, engine.name);
                dropdown.appendChild(option);
            });

            // 标记默认选中项
            dropdown.querySelector('[data-code="auto"]').classList.add('selected');
        }

        function selectEngine(code, name) {
            selectedEngine = code;
            document.getElementById('engineInput').value = name;

            // 更新选中状态
            document.querySelectorAll('#engineDropdown .select-option').forEach(opt => {
                opt.classList.remove('selected');
            });
            document.querySelector(`#engineDropdown [data-code="${code}"]`).classList.add('selected');

            hideEngineDropdown();
        }

        function showEngineDropdown() {
            const dropdown = document.getElementById('engineDropdown');
            const arrow = document.getElementById('engineArrow');
            dropdown.style.display = 'block';
            arrow.classList.add('open');
            isEngineDropdownOpen = true;
        }

        function hideEngineDropdown() {
            setTimeout(() => {
                const dropdown = document.getElementById('engineDropdown');
                const arrow = document.getElementById('engineArrow');
                dropdown.style.display = 'none';
                arrow.classList.remove('open');
                isEngineDropdownOpen = false;
            }, 150);
        }

        function filterEngines() {
            const input = document.getElementById('engineInput');
            const filter = input.value.toLowerCase();
            const options = document.querySelectorAll('#engineDropdown .select-option');
            let hasResults = false;

            options.forEach(option => {
                const text = option.textContent.toLowerCase();
                if (text.includes(filter)) {
                    option.classList.remove('hidden');
                    hasResults = true;
                } else {
                    option.classList.add('hidden');
                }
            });

            // 显示/隐藏无结果提示
            let noResults = document.querySelector('#engineDropdown .no-results');
            if (!hasResults && filter) {
                if (!noResults) {
                    noResults = document.createElement('div');
                    noResults.className = 'no-results';
                    noResults.textContent = '未找到匹配的引擎';
                    document.getElementById('engineDropdown').appendChild(noResults);
                }
                noResults.style.display = 'block';
            } else if (noResults) {
                noResults.style.display = 'none';
            }
        }

        // 页面加载完成后初始化
        document.addEventListener('DOMContentLoaded', function () {
            initLanguageDropdown();
            initEngineDropdown();
        });
    </script>
</body>

</html>
